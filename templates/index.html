<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

/* Navbar */
.navbar{
    background:#111;
    color:white;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:17px;
    transition:0.3s;
}

.nav-links a:hover{
    color:#f39c12;
}

/* Hero Section */
.hero{
    height:300px;
    background:url("https://images.unsplash.com/photo-1441986300917-64674bd600d8") center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:50px;
    background:rgba(0,0,0,0.6);
    padding:15px 30px;
    border-radius:10px;
}

/* Search Section */
.search-container{
    width:90%;
    margin:30px auto;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.search-container input,
.search-container select{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    flex:1;
    min-width:180px;
}

.search-btn{
    background:#111;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
}

.search-btn:hover{
    background:#333;
}

/* Products */
.products{
    width:90%;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card-body{
    padding:15px;
}

.card-body h3{
    margin-bottom:10px;
}

.price{
    color:#e74c3c;
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.category{
    color:#666;
    margin-bottom:15px;
}

.details-btn{
    display:inline-block;
    text-decoration:none;
    background:#111;
    color:white;
    padding:10px 18px;
    border-radius:6px;
}

.details-btn:hover{
    background:#333;
}

/* Footer */
.footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}

@media(max-width:768px){
    .navbar{
        flex-direction:column;
        gap:15px;
    }

    .hero h1{
        font-size:35px;
    }
}
</style>
</head>

<body>


<div class="navbar">
    <div class="logo">Fashion Hub</div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Men</a>
        <a href="#">Women</a>
    </div>
</div>

<div class="hero">
    <h1>Discover Your Style</h1>
</div>

<form method="GET" class="filters">

     <input type="text" name="search" placeholder="Search clothes..." value="{{ search }}">

    <!-- Category -->
    <select name="category">
        <option value="">All Categories</option>
        <option value="Men" {% if category=='Men' %}selected{% endif %}>Men</option>
        <option value="Women" {% if category=='Women' %}selected{% endif %}>Women</option>
        <option value="Unisex" {% if category=='Unisex' %}selected{% endif %}>Unisex</option>
    </select>

     <!-- Sort -->
    <select name="sort">
        <option value="">Sort by</option>
        <option value="low" {% if sort=='low' %}selected{% endif %}>Price Low to High</option>
        <option value="high" {% if sort=='high' %}selected{% endif %}>Price High to Low</option>
    </select>

    <button type="submit">Apply</button>

</form>

<!-- Products Section -->
<div class="products">

    {% for product in products %}

    <div class="card">

        <img src="{{ product.image }}" alt="Product Image">

        <div class="card-body">

            <h3>{{ product.name }}</h3>

            <p class="price">₹{{ product.price }}</p>

            <p class="category">
                {{ product.category }} | {{ product.cloth_type }}
            </p>

        </div>

    </div>

    {% endfor %}

</div>

{% if products|length == 0 %}
<h2 style="text-align:center; margin:30px;">
    No products found
</h2>
{% endif %}

<!-- Footer -->
<div class="footer">
    © 2026 Fashion Hub | All Rights Reserved
</div>

</body>
</html>
